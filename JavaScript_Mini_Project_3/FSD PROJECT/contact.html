<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Spendly</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forms.css">
</head>

<body>

<!-- NAVBAR -->
<header class="nav">
  <div class="nav-left">
    <h2>💸 Spendly</h2>
  </div>

  <div class="nav-right">
    <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
  </div>
</header>

<!-- HERO -->
<section class="contact-hero">
  <h1>Contact Us 📩</h1>
  <p>Have questions or feedback? Send us a message.</p>
</section>

<!-- FORM -->
<div class="contact-container">

  <form id="contactForm" class="contact-card">

    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" id="name" class="form-input no-icon" required>
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input no-icon" required>
    </div>

    <div class="form-group">
      <label class="form-label">Message</label>
      <textarea id="message" class="form-textarea" required></textarea>
    </div>

    <button type="submit" class="btn btn-full">Send Message</button>

    <p id="successMsg" style="color:green; margin-top:10px; display:none;">
      Message sent successfully!
    </p>

  </form>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  // simple fake submission
  document.getElementById("successMsg").style.display = "block";

  // clear form
  this.reset();
});
</script>

</body>
</html>
